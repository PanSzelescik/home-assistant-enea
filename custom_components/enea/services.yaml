refresh:
  name: Refresh meter
  description: Manually fetch the latest data from the Portal Odbiorcy Enea. If no device is specified, all configured meters are refreshed.
  fields:
    device_id:
      name: Device
      description: The meter to refresh. Leave empty to refresh all meters.
      required: false
      selector:
        device:
          integration: enea

backfill:
  name: Backfill statistics
  description: Import historical statistics from the Portal Odbiorcy Enea for a custom date range. Use start_date/end_date for an explicit range, or days_back for a relative range from yesterday. If none are provided, defaults to the last 30 days.
  fields:
    device_id:
      name: Device
      description: The meter to backfill. Leave empty to backfill all meters.
      required: false
      selector:
        device:
          integration: enea
    start_date:
      name: Start date
      description: First day to import (inclusive). Use with end_date. Takes precedence over days_back.
      required: false
      selector:
        date:
    end_date:
      name: End date
      description: Last day to import (inclusive). Defaults to yesterday when start_date is provided.
      required: false
      selector:
        date:
    days_back:
      name: Days back
      description: Number of days to go back from yesterday. Ignored when start_date is provided.
      required: false
      selector:
        number:
          min: 1
          max: 365
          mode: box
